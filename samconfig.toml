version = 0.1

# Default deploy configuration
# Replace REPLACE_WITH_LABROLE_ARN before deploying, or pass --parameter-overrides.
# Region is us-east-1 (vockey key pair and LabInstanceProfile are available there).

[default.global.parameters]
stack_name = "noise-exposure-backend-dev"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name = "noise-exposure-backend-dev"
region = "us-east-1"
resolve_s3 = true
confirm_changeset = false
disable_rollback = false
parameter_overrides = "EnvName=\"dev\" LabRoleArn=\"REPLACE_WITH_LABROLE_ARN\""

[default.validate.parameters]
lint = true
