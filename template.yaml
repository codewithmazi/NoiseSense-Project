AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Noise Exposure backend (proof-of-concept)

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedPattern: '[a-z0-9-]+'
    Description: Environment name used for resource naming (e.g. dev, test).
  LabRoleArn:
    Type: String
    Description: >
      ARN of the provided LabRole. Used as the execution role for every
      Lambda and Step Functions resource.
    AllowedPattern: '^arn:aws:iam::\d{12}:role/LabRole$'
  ThresholdDbA:
    Type: String
    Default: '70'
    Description: dB(A) threshold above which a noise-exposure alert is raised.
  AlertEmail:
    Type: String
    Default: ''
    Description: Optional email to receive alerts (you must confirm the SNS subscription email).

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Architectures:
      - x86_64

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Resources:
  ## SSM ##
  AppNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/noise/${EnvName}/app-name'
      Type: String
      Value: noise-exposure-backend
      Description: Application name for the noise-exposure backend.


      ## NoSQL DATABASE ##
  NoiseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'noise-data-${EnvName}'
      BillingMode: PAY_PER_REQUEST         
      AttributeDefinitions:
        - AttributeName: User
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: User
          KeyType: HASH                     # partition key
        - AttributeName: Timestamp
          KeyType: RANGE                    # sort key
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES  # enables downstream triggers in later stages
      SSESpecification:
        SSEEnabled: true                    # encryption at rest (AWS-managed key; maybe CMK later)
      Tags:
        - Key: project
          Value: noise-exposure
        - Key: env
          Value: !Ref EnvName


          ## STORAGE ##
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: noise-exposure-data-arc45
      PublicAccessBlockConfiguration:       #blocking public access
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256          # default encryption at rest
      Tags:
        - Key: project
          Value: noise-exposure
        - Key: env
          Value: !Ref EnvName


          ## COGNITO ##
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'noise-users-${EnvName}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false     
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT 
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'noise-app-client-${EnvName}'
      UserPoolId: !Ref UserPool
      GenerateSecret: false                
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH          # lets the seed client get a JWT via username/password
        - ALLOW_REFRESH_TOKEN_AUTH


                  ## PARAMETERS ##
  TableNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/noise/${EnvName}/table-name'
      Type: String
      Value: !Ref NoiseTable

  BucketNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/noise/${EnvName}/bucket-name'
      Type: String
      Value: !Ref DataBucket

  UserPoolIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/noise/${EnvName}/user-pool-id'
      Type: String
      Value: !Ref UserPool

  UserPoolClientIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/noise/${EnvName}/app-client-id'
      Type: String
      Value: !Ref UserPoolClient


              ## API ##
  NoiseHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoJwtAuthorizer   


          ## INGEST LAMBDA ##
  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'noise-ingest-${EnvName}'
      Handler: app.handler
      Runtime: python3.12
      CodeUri: src/ingest/
      Role: !Ref LabRoleArn                       
      Environment:
        Variables:
          TABLE_NAME: !Ref NoiseTable
          EVENT_BUS_NAME: !Ref NoiseEventBus
      Events:
        PostMetrics:
          Type: HttpApi
          Properties:
            ApiId: !Ref NoiseHttpApi
            Method: POST
            Path: /metrics
        GetHistory:
          Type: HttpApi
          Properties:
            ApiId: !Ref NoiseHttpApi
            Method: GET
            Path: /history


            ## EVENTBRIDGE ##
  NoiseEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub 'noise-events-${EnvName}'

  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'noise-alerts-${EnvName}'

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail


            ## SQS DLQ ##
  ThresholdDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'noise-threshold-dlq-${EnvName}'
      MessageRetentionPeriod: 1209600      # Retention period of 14 days

  ThresholdDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ThresholdDLQ
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ThresholdDLQ.Arn


              ## THRESHOLD LAMBDA ##
  ThresholdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'noise-threshold-${EnvName}'
      Handler: app.handler
      Runtime: python3.12
      CodeUri: src/threshold/
      Role: !Ref LabRoleArn
      Environment:
        Variables:
          ALERT_TOPIC_ARN: !Ref AlertsTopic
          THRESHOLD_DBA: !Ref ThresholdDbA
      Events:
        MetricsReceived:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref NoiseEventBus
            Pattern:
              source:
                - noise.ingest
              detail-type:
                - MetricsReceived
            DeadLetterConfig:
              Arn: !GetAtt ThresholdDLQ.Arn


Outputs:
  Environment:
    Description: Environment name for this stack.
    Value: !Ref EnvName
  LabRoleArnInUse:
    Description: LabRole ARN configured for execution roles.
    Value: !Ref LabRoleArn
  ConfigNamespace:
    Description: SSM Parameter Store namespace for app configurations.
    Value: !Sub '/noise/${EnvName}'
  TableName:
    Description: DynamoDB table name.
    Value: !Ref NoiseTable
  TableStreamArn:
    Description: DynamoDB Streams ARN.
    Value: !GetAtt NoiseTable.StreamArn
  BucketName:
    Description: S3 data bucket name.
    Value: !Ref DataBucket
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool App Client ID.
    Value: !Ref UserPoolClient
  UserPoolIssuerUrl:
    Description: Issuer URL (used by the API Gateway JWT authorizer).
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
  ApiBaseUrl:
    Description: Base URL of the HTTP API (POST /metrics, GET /history).
    Value: !Sub 'https://${NoiseHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  AlertsTopicArn:
    Description: SNS topic ARN for noise-exposure alerts.
    Value: !Ref AlertsTopic
  EventBusName:
    Description: EventBridge bus name.
    Value: !Ref NoiseEventBus
  ThresholdDlqUrl:
    Description: SQS dead-letter queue URL for failed threshold events.
    Value: !Ref ThresholdDLQ
